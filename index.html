<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban</title>
    <style>
        body{
            background-color: #747171;
            justify-content: center;
            align-items: center;
        }
        .cabecalho{
            background:linear-gradient(to right,rgb(54, 54, 56),rgb(223, 219, 228)) ;
            border-radius: 20px;
            width: 50%;
            text-align: center;
            padding: 15px;
            margin-left: 425px;
        }
        .navegacao{
            background:linear-gradient(to right,blue,blueviolet) ;
            padding: 8px;
            color: white;
            border-radius: 10px;
            text-align: center;
            margin-left: 10px;
        }
        .juliano{
            justify-content: center;
            align-items: center;
            display: inline-block;
            margin-left: 800px;
            border-radius: 20px;
            border-color: blue;
            padding: 8px;
        }
        button{
            background: linear-gradient(to right,rgb(0, 255, 55),rgb(43, 226, 165));
            border-color: blue;
            color:white;
            border-radius: 10px;
            padding: 8px;
            width:10vh;
            cursor: pointer;
        }
        .container{
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
                .container div{
            border: 2px solid #333;
            border-radius: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            flex: 1; /* mantém as colunas iguais */
        }
        ul{
            list-style: none;
            padding: 0;
        }
        li{
            background: #eeee;
            margin: 5px;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<script>
function addTask() {
  const input = document.getElementById("taskInput");
  const taskText = input.value;

  if (taskText === "") {
    alert("Digite uma tarefa!");
    return;
  }

  const li = document.createElement("li");
  li.textContent = taskText;

  // Primeiro clique: vai para "Em andamento"
  li.onclick = function () {
    if (li.parentElement.id === "coisaslist") {
      document.getElementById("andamentolist").appendChild(li);
    } 
    // Segundo clique: vai para "Concluído"
    else if (li.parentElement.id === "andamentolist") {
      document.getElementById("conclusaolist").appendChild(li);
    }
  };

  document.getElementById("coisaslist").appendChild(li);
  input.value = "";
}
</script>

<body>
    
    <header class="cabecalho">
        <h1>Gerenciador de Tarefas </h1>
    </header>
    <br>

    <input class="juliano" type="text" id="taskInput" placeholder="Nova Tarefa ">
    <button onclick="addTask()">Adicionar</button>
    <br>

    <div class="container">
        <div>
            <h2>A fazer</h2>
            <ul id="coisaslist"></ul>
        </div>

        <div>
            <h2>Em andamento</h2>
            <ul id="andamentolist"></ul>
        </div>

        <div>
            <h2>Concluido</h2>
            <ul id="conclusaolist"></ul>
        </div>
    </div>

</body>
</html>
